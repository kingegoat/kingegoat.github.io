<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0b0d12"/>
            <stop offset="100%" stop-color="#151923"/>
        </linearGradient>
        <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#06b6d4"/>
        </linearGradient>
        <radialGradient id="orb" cx="0.5" cy="0.5" r="0.6">
            <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
        </radialGradient>
    </defs>
    <rect width="1200" height="630" fill="url(#bg)"/>
    <circle cx="900" cy="200" r="320" fill="url(#orb)"/>
    <g transform="translate(80, 230)">
        <text font-family="Inter, sans-serif" font-weight="800" font-size="92" fill="url(#accent)" letter-spacing="-3">kingegoat.</text>
        <text y="80" font-family="Inter, sans-serif" font-weight="600" font-size="36" fill="#e8ecf3">Full-stack developer.</text>
        <text y="130" font-family="Inter, sans-serif" font-weight="400" font-size="24" fill="#a4adbf">Лендинги · Telegram-боты · API на FastAPI</text>
        <g transform="translate(0, 180)">
            <rect width="260" height="52" rx="26" fill="url(#accent)"/>
            <text x="130" y="34" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="18" fill="#0b0d12">github.com/kingegoat</text>
        </g>
    </g>
</svg>
